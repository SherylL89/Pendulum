services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pendulum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pendulum}
      POSTGRES_DB: ${POSTGRES_DB:-pendulum}
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pendulum"]
      interval: 5s
      retries: 10

  api:
    build: ./apps/api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pendulum}:${POSTGRES_PASSWORD:-pendulum}@db:5432/${POSTGRES_DB:-pendulum}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SEED_ON_START: "1"
    ports: ["8000:8000"]
    depends_on:
      db: { condition: service_healthy }

  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pgdata:
